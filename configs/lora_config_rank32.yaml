# mlx-lm LoRA 训练配置 (rank=32 超参实验)
# 用法: python -m mlx_lm lora --config configs/lora_config_rank32.yaml

model: "Qwen/Qwen2.5-1.5B-Instruct"
train: true
fine_tune_type: lora
data: "data/processed"
seed: 42

lora_parameters:
  keys:
    - "self_attn.q_proj"
    - "self_attn.k_proj"
    - "self_attn.v_proj"
    - "self_attn.o_proj"
    - "mlp.gate_proj"
    - "mlp.up_proj"
    - "mlp.down_proj"
  rank: 32
  scale: 2.0           # alpha / rank = 64 / 32
  dropout: 0.05

num_layers: -1
batch_size: 2
iters: 1000
learning_rate: 2.0e-4
steps_per_report: 10
steps_per_eval: 100
val_batches: 25
grad_accumulation_steps: 8
max_seq_length: 2048

lr_schedule:
  name: cosine_decay
  warmup: 50
  warmup_init: 1.0e-7
  arguments: [2.0e-4, 1000, 1.0e-7]

adapter_path: "outputs/adapters_rank32"
save_every: 200
grad_checkpoint: true
test: false
test_batches: 50
mask_prompt: true
