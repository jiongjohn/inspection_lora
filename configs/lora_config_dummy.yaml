# mlx-lm LoRA 训练配置 (Dummy 验证用)
# 用法: python -m mlx_lm lora --config configs/lora_config_dummy.yaml

# 模型
model: "Qwen/Qwen2.5-1.5B-Instruct"

# 训练模式
train: true
fine_tune_type: lora

# 数据路径 (dummy 数据，不影响真实数据)
data: "data/dummy"

# 随机种子
seed: 42

# LoRA 参数
lora_parameters:
  keys:
    - "self_attn.q_proj"
    - "self_attn.k_proj"
    - "self_attn.v_proj"
    - "self_attn.o_proj"
    - "mlp.gate_proj"
    - "mlp.up_proj"
    - "mlp.down_proj"
  rank: 16
  scale: 2.0
  dropout: 0.05

# 微调层数 (-1 = 全部层)
num_layers: -1

# 训练超参 (极少量，仅验证 pipeline)
batch_size: 2
iters: 10
learning_rate: 2.0e-4
steps_per_report: 2
steps_per_eval: 5
val_batches: 2
grad_accumulation_steps: 1
max_seq_length: 512

# Adapter 保存
adapter_path: "outputs/adapters_dummy"
save_every: 5

# 梯度检查点
grad_checkpoint: true

# 评估
test: false

# Prompt masking
mask_prompt: true
